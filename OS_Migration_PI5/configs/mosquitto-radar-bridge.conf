# Bridge: subscribe to ESP32-RADAR topics on the VIP broker (Pi4 when MASTER)
# and republish locally so Pi5's mybot always receives radar motion events
# even when Pi5 is BACKUP. When Pi5 is MASTER, the bridge connects to Pi5's
# own broker — duplicates are harmless (recording state checks + Telegram
# cooldown timers prevent double actions).

connection radar-from-vip
address 192.168.1.100:1883
bridge_protocol_version mqttv311

remote_username mq
remote_password mq

topic home/esp32/radar2/motion in 1 "" ""
topic home/esp32/radar2/availability in 1 "" ""

restart_timeout 5
