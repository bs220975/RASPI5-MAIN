# Bridge Pi5 ↔ Pi4 (fixed IP .122)
#
# IN  — Pi5 receives ESP32 sensor/device events from Pi4's broker,
#        regardless of which Pi holds the .100 VIP.
#
# OUT — Pi5 forwards relay/switch commands to Pi4's broker so ESP32
#        devices (which connect to .100 = Pi4 when Pi4 is MASTER)
#        receive the commands even when Pi5 is BACKUP.
#
# Deploy to: /etc/mosquitto/conf.d/bridge_pi4.conf
# Then:      sudo systemctl restart mosquitto

connection pi4-radar-bridge
address 192.168.1.122:1883
remote_username mq
remote_password mq
cleansession true
restart_timeout 10

# Inbound: radar motion events from ESP32-LP-RDR1
topic home/esp32/radar1/# in 1

# Inbound: LP relay state/availability so Pi5 can update Firebase/app
# when the 5-min motion timer turns the light off
topic home/switches/L-Porch-Light/state in 1
topic home/switches/L-Porch-Light/availability in 1

# Outbound: relay/switch commands from Pi5's services to all ESP devices
topic home/switches/L-Porch-Light/cmd out 1
topic home/esp01/upper-lobby/cmd/# out 1
topic home/esp01/lower-lobby/cmd/# out 1
