# Bridge Pi5 → Pi4 (fixed IP .122) for ESP32-LP-RDR1 radar topics.
# Pi5 subscribes to these topics from Pi4's broker so it receives
# radar motion events regardless of which Pi holds the .100 VIP.
#
# When Pi4 is MASTER (.100 = Pi4): ESP32 publishes to Pi4 → bridge
#   forwards to Pi5's local broker → lp_rdr_service.py records video.
# When Pi5 is MASTER (.100 = Pi5): ESP32 publishes directly to Pi5's
#   broker; bridge to Pi4 gets nothing (Pi4 has no messages) — no
#   duplicates, Pi5 receives via its own broker directly.
#
# Deploy to: /etc/mosquitto/conf.d/bridge_pi4.conf
# Then:      sudo systemctl restart mosquitto

connection pi4-radar-bridge
address 192.168.1.122:1883
remote_username mq
remote_password mq
cleansession true
restart_timeout 10
topic home/esp32/radar1/# in 1
