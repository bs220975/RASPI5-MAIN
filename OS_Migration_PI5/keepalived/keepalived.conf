# Keepalived VRRP config — Pi5 (192.168.1.108)
#
# Floating hub IP: 192.168.1.100
# Pi4 is the preferred MASTER (priority 101). Pi5 is BACKUP (priority 100).
# Pi4 reclaims VIP automatically when its mybot recovers.
# Pi5 takes over when Pi4's mybot.service stops (Pi4 drops to 81, Pi5 stays at 100).
# notify_master/backup auto-starts/stops mybot.service on Pi5.
#
# Install:  sudo apt install keepalived
# Deploy:   sudo cp keepalived.conf /etc/keepalived/keepalived.conf
# Enable:   sudo systemctl enable --now keepalived
# Status:   sudo systemctl status keepalived
# Check VIP: ip addr show wlan0 | grep 192.168.1.100

global_defs {
    script_user root
    enable_script_security
}

vrrp_instance HUB_IP {
    state BACKUP                # Pi5 starts as BACKUP; Pi4 wins election (higher priority)
    interface wlan0
    virtual_router_id 51        # must match on both Pis
    priority 100                # Pi5 = 100. Pi4 = 101 (MASTER).
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass pihub123
    }

    virtual_ipaddress {
        192.168.1.100/24 dev wlan0
    }

    notify_master "/usr/bin/systemctl start mybot.service"
    notify_backup "/usr/bin/systemctl stop mybot.service"
    notify_fault  "/usr/bin/systemctl stop mybot.service"
}
