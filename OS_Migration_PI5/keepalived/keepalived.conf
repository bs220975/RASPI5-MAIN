# Keepalived VRRP config — Pi5 (192.168.1.108)
#
# Floating hub IP: 192.168.1.100
# Pi4 is the preferred MASTER (priority 101). Pi5 is BACKUP (priority 100).
# Pi4 holds the VIP as long as keepalived is running on it.
# Pi5 takes over only if Pi4's keepalived/wlan0 goes down.
#
# mybot.service runs on Pi5 at all times — it handles RADAR1 motion, video recording
# with Pi5's camera, and lobby light control independently of VRRP state.
# Telegram command processing is gated in bot_commands.py by a VIP check:
# only the Pi holding 192.168.1.100 responds to commands; the BACKUP Pi drops them.
#
# Install:  sudo apt install keepalived
# Deploy:   sudo cp keepalived.conf /etc/keepalived/keepalived.conf
# Drop-in:  sudo cp keepalived-wait-for-wlan.conf /etc/systemd/system/keepalived.service.d/wait-for-wlan.conf
# Enable:   sudo systemctl daemon-reload && sudo systemctl enable --now keepalived
# Status:   sudo systemctl status keepalived
# Check VIP: ip addr show wlan0 | grep 192.168.1.100

global_defs {
    script_user root
    enable_script_security
}

vrrp_instance HUB_IP {
    state BACKUP                # Pi5 starts as BACKUP; Pi4 wins (higher priority)
    interface wlan0
    virtual_router_id 51        # must match on both Pis
    priority 100                # Pi5 = 100. Pi4 = 101 (MASTER).
    advert_int 2

    authentication {
        auth_type PASS
        auth_pass pihub123
    }

    virtual_ipaddress {
        192.168.1.100/24 dev wlan0
    }

    # Safety net: if Pi5 takes over as MASTER, ensure mybot is running.
    notify_master "/usr/bin/systemctl start mybot.service"
}
