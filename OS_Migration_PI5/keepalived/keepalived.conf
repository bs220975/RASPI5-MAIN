# Keepalived VRRP config — Pi5 (192.168.1.108)
#
# Floating hub IP: 192.168.1.100
# Whichever Pi starts mybot.service first claims this IP.
# If it stops or crashes, the other Pi takes over within ~3 seconds.
# When the failed Pi recovers it rejoins as BACKUP (does not reclaim VIP).
#
# Install:  sudo apt install keepalived
# Deploy:   sudo cp keepalived.conf /etc/keepalived/keepalived.conf
# Enable:   sudo systemctl enable --now keepalived
# Status:   sudo systemctl status keepalived
# Check VIP: ip addr show eth0 | grep 192.168.1.100

# Health check — monitors mybot.service
# If mybot stops: priority drops by 20 (100 → 80) → other Pi takes over
vrrp_script check_mybot {
    script "/usr/bin/systemctl is-active mybot.service"
    interval 2       # check every 2 seconds
    weight   -20     # subtract 20 from priority when check fails
    fall     2       # declare failed after 2 consecutive failures
    rise     2       # declare recovered after 2 consecutive successes
}

vrrp_instance HUB_IP {
    state BACKUP                # both Pis start as BACKUP
                                # first to advertise becomes MASTER
    interface eth0              # ← change to wlan0 if using Wi-Fi only
    virtual_router_id 51        # must match on both Pis; unique on your LAN
    priority 100                # equal priority on both Pis
    advert_int 1                # VRRP heartbeat every 1 second
    nopreempt                   # don't reclaim VIP after recovering from failure

    authentication {
        auth_type PASS
        auth_pass pihub2024     # must match on both Pis
    }

    virtual_ipaddress {
        192.168.1.100/24 dev eth0
    }

    track_script {
        check_mybot
    }
}
