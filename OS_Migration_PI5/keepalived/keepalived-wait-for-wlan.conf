[Service]
# Wait until wlan0 has Pi5's IP before starting VRRP election.
# Without this, wlan0 flaps ~4s after keepalived starts (WiFi reassociation),
# causing Pi5 to claim MASTER before it can receive Pi4's adverts → split-brain.
ExecStartPre=/bin/bash -c 'for i in $(seq 1 30); do ip addr show wlan0 | grep -q "192.168.1.108" && exit 0; sleep 1; done; exit 1'
ExecStartPre=/bin/sleep 5
