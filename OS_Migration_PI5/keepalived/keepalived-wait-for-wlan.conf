[Service]
# wlan0 reassociates after boot and flaps for ~9s. The three-step check below
# waits for Pi5's IP to appear, sleeps 20s for full WiFi stability, then
# verifies the IP is still present before allowing keepalived to start.
# Without this, Pi5 misses Pi4's VRRP adverts during the flap and self-promotes.
ExecStartPre=/bin/bash -c 'for i in $(seq 1 30); do ip addr show wlan0 | grep -q "192.168.1.108" && exit 0; sleep 1; done; exit 1'
ExecStartPre=/bin/sleep 20
ExecStartPre=/bin/bash -c 'for i in $(seq 1 10); do ip addr show wlan0 | grep -q "192.168.1.108" && exit 0; sleep 1; done; exit 1'
